# XGBoost baseline configuration
# Based on paper Section 2.7 and Supplementary S2.3

model:
  name: "XGBoost"
  architecture: "Gradient Boosted Trees"
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  random_state: 42
  # Feature engineering details are handled in the model code (20 features per window)

training:
  # XGBoost does not use epochs/batch in the same way; these are placeholders
  cross_validation_folds: 5
  early_stopping_rounds: 10  # if using early stopping with validation set

data_preprocessing:
  normalization: "z-score"
  missing_handling: "zero_pad + attention_mask"  # applied before feature extraction
  interpolation_max_gap: 5
  feature_engineering: "20 summary stats per window (mean, slope, min, max, var for each variable)"