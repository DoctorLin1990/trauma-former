# Informer baseline configuration
# Based on paper Section 2.7 and Supplementary S2.3

model:
  name: "Informer"
  architecture: "Informer"
  enc_in: 4
  dec_in: 4
  c_out: 4
  seq_len: 60
  label_len: 30  # half of seq_len as typical
  out_len: 1     # classification needs only one output
  d_model: 128
  n_heads: 4
  e_layers: 3
  d_layers: 2
  d_ff: 512
  dropout: 0.2
  factor: 5
  attn: "prob"
  # Additional parameters from official implementation can be added here

training:
  optimizer: "AdamW"
  learning_rate: 0.0001
  weight_decay: 0.01
  batch_size: 64
  max_epochs: 100
  early_stopping_patience: 10
  loss_function: "binary_cross_entropy"
  validation_metric: "AUROC"

data_preprocessing:
  normalization: "z-score"
  missing_handling: "zero_pad + attention_mask"
  interpolation_max_gap: 5