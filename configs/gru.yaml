# GRU baseline configuration (Supplementary Table S2.4)

model:
  name: "GRU"
  architecture: "Bidirectional GRU"
  input_variables: ["HR", "SBP", "DBP", "SpO2"]
  window_length: 60
  hidden_size: 64
  num_layers: 2
  bidirectional: true
  fc_hidden: 64
  dropout: 0.20

training:
  optimizer: "AdamW"
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  batch_size: 64
  max_epochs: 200
  early_stopping_patience: 10
  loss_function: "binary_cross_entropy"
  validation_metric: "AUROC"

data_preprocessing:
  normalization: "z-score"
  missing_handling: "zero_pad + attention_mask"
  interpolation_max_gap: 5
