# final_config.yaml
# Master configuration file referenced in Supplementary S2.4:
#   python train_all_models.py --config configs/final_config.yaml --seed 42
#
# This file defines the best Trauma-Former configuration selected by Bayesian
# hyperparameter search (50 trials, Supplementary S2.2.1 / Table S2.1 Rank 1).
# All baseline model configurations are in their individual YAML files.
#
# NOTE: train_all_models.py uses per-model configs from the configs/ directory;
# this file serves as a human-readable summary of the final configuration and
# is preserved for documentation / audit trail purposes.

experiment:
  name: "Trauma-Former vs Baselines — Development Cohort"
  seed: 42
  n_folds: 5
  data: "data/development_set.npz"
  test_data: "data/test_set.npz"
  results_dir: "results/"

trauma_former:
  model:
    d_model: 256
    n_heads: 4
    n_layers: 2
    d_ff: 512
    dropout: 0.20
    classifier_hidden: 128
    activation: "gelu"
    total_parameters: 1524481
  training:
    optimizer: "AdamW"
    learning_rate: 1.0e-4
    weight_decay: 1.0e-4
    batch_size: 64
    max_epochs: 200
    early_stopping_patience: 10
  bayesian_search:
    n_trials: 50
    framework: "optuna==3.3.0"
    search_space:
      d_model: [128, 256, 512]
      n_layers: [1, 2, 3, 4]
      n_heads: [2, 4, 8]
      d_ff: [256, 512, 1024]
      dropout: [0.1, 0.5]       # log-uniform
      learning_rate: [1e-5, 1e-3]  # log-uniform
      batch_size: [32, 64, 128]

baselines:
  - name: lr-trend
    config: configs/lr_trend.yaml
  - name: lstm
    config: configs/lstm.yaml
  - name: gru
    config: configs/gru.yaml
  - name: cnn
    config: configs/cnn.yaml
  - name: xgboost
    config: configs/xgboost.yaml
  - name: patchtst
    config: configs/patchtst.yaml
  - name: informer
    config: configs/informer.yaml
  - name: shock-index
    config: configs/trauma_former.yaml   # config not used; listed for pipeline completeness
