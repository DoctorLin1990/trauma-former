# PatchTST baseline configuration
# Based on paper Section 2.7 and Supplementary S2.3

model:
  name: "PatchTST"
  architecture: "PatchTST"
  input_dim: 4
  window_length: 60
  patch_len: 16
  stride: 8
  n_layers: 3
  d_model: 128
  n_heads: 4
  dropout: 0.2
  head_dropout: 0.2
  # Additional parameters from official implementation can be added here

training:
  optimizer: "AdamW"
  learning_rate: 0.0001
  weight_decay: 0.01
  batch_size: 64
  max_epochs: 100
  early_stopping_patience: 10
  loss_function: "binary_cross_entropy"
  validation_metric: "AUROC"

data_preprocessing:
  normalization: "z-score"
  missing_handling: "zero_pad + attention_mask"
  interpolation_max_gap: 5