# Trauma-Former model configuration
# Architecture: Supplementary Table S2.2 (best Bayesian-search configuration)
# Training: Section 2.7 / Supplementary S2.2.2

model:
  name: "Trauma-Former"
  architecture: "iTransformer"
  input_variables: ["HR", "SBP", "DBP", "SpO2"]
  window_length: 60          # T = 60 s at 1 Hz
  d_model: 256               # embedding dimension   (Rank-1 search result)
  n_layers: 2                # Transformer encoder layers
  n_heads: 4                 # attention heads
  d_ff: 512                  # feed-forward hidden dim
  dropout: 0.20              # applied to attention and classifier
  activation: "gelu"
  classifier_hidden: 128     # MLP hidden units
  total_parameters: 1524481  # from PyTorch summary (Supplementary Table S2.2)

training:
  optimizer: "AdamW"
  learning_rate: 1.0e-4      # Supplementary Table S2.2
  weight_decay:  1.0e-4      # Supplementary Table S2.2  (NOTE: NOT 0.01)
  batch_size: 64
  max_epochs: 200             # Supplementary Table S2.2  (NOTE: NOT 100)
  early_stopping_patience: 10
  loss_function: "binary_cross_entropy"
  validation_metric: "AUROC"

data_preprocessing:
  normalization: "z-score"
  missing_handling: "zero_pad + attention_mask"
  interpolation_max_gap: 5    # seconds; linear interpolation for gaps ≤5 s
